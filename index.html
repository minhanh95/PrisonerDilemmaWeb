<!DOCTYPE html>
<html lang="en-us">
  <head>
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Unity Web Player | PrisonerDilemma</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      
      body {
        width: 100%;
        height: 100vh;
        overflow: hidden;
        display: flex;
        justify-content: center;
        align-items: center;
        background-image: url('bgr.png');
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
      }
      
      #game-container {
        aspect-ratio: 1080 / 1920;
        max-width: 100vw;
        max-height: 100vh;
        width: auto;
        height: auto;
        position: relative;
      }
      
      #unity-canvas {
        width: 100%;
        height: 100%;
        display: block;
      }
    </style>
  </head>
  <body>
    <div id="game-container">
      <canvas id="unity-canvas" width=1080 height=1920 tabindex="-1"></canvas>
    </div>
    
    <script src="Build/Test.loader.js"></script>
    <script>
      if (/iPhone|iPad|iPod|Android/i.test(navigator.userAgent)) {
        var meta = document.createElement('meta');
        meta.name = 'viewport';
        meta.content = 'width=device-width, height=device-height, initial-scale=1.0, user-scalable=no, shrink-to-fit=yes';
        document.getElementsByTagName('head')[0].appendChild(meta);
      }

      createUnityInstance(document.querySelector("#unity-canvas"), {
        arguments: [],
        dataUrl: "Build/Test.data.unityweb",
        frameworkUrl: "Build/Test.framework.js.unityweb",
        codeUrl: "Build/Test.wasm.unityweb",
        streamingAssetsUrl: "StreamingAssets",
        companyName: "MonoPoly",
        productName: "PrisonerDilemma",
        productVersion: "0.1.0",
        // matchWebGLToCanvasSize: false, // Uncomment this to separately control WebGL canvas render size and DOM element size.
        // devicePixelRatio: 1, // Uncomment this to override low DPI rendering on high DPI displays.
      }).then((unityInstance) => {
      }).catch((message) => {
        alert(message);
      });
    </script>
  </body>
</html>
